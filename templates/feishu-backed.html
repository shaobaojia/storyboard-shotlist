<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>{{TITLE}} · 分镜全篇</title>
<style>
:root{--bg:#2b2b2b;--card:#222222;--border:#222222;--text:#e0e0e0;--head:#e0e0e0;--accent:#f43f5e;--green:#22c55e;--row-light:#3a3a3a;--row-dark:#333333}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:15px/1.6 -apple-system,BlinkMacSystemFont,sans-serif}
.container{width:100%;padding:24px 32px}
.top{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:0}
.top h1{color:var(--head);font-size:24px;font-weight:700}
.top h1 span{color:var(--accent)}
.sub{color:var(--text);font-size:14px;margin-top:6px}

/* ── Radio hiding ── */
input[name=scene],input[name^=sub-]{display:none}

/* ── Scene tabs ── */
.scene-section{display:none}
#scene-arc:checked~#arc-section{display:block}
#scene-s010:checked~#s010-section{display:block}
/* #scene-s020:checked~#s020-section{display:block} ... */
.scene-tabs{display:flex;gap:0;padding:0;background:var(--card);border-bottom:2px solid var(--accent);overflow-x:auto}
.scene-tabs label{display:block;padding:10px 16px;color:#888;font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;cursor:pointer;white-space:nowrap}
.scene-tabs label:hover{color:var(--head);background:rgba(255,255,255,.03)}
#scene-arc:checked~.scene-tabs label[for=scene-arc],
#scene-s010:checked~.scene-tabs label[for=scene-s010]
{border-bottom-color:var(--accent);color:var(--head)}

/* ── Sub-tabs ── */
.sub-tabs{display:flex;gap:0;padding:0;background:var(--bg);border-bottom:1px solid var(--border)}
.sub-tabs label{display:block;padding:8px 16px;color:var(--text);font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;cursor:pointer}
.sub-tabs label:hover{color:var(--head)}
.sub-content{display:none;padding:16px 0}
#sub-beat-s010:checked~#beat-s010{display:block}
#sub-v1-s010:checked~#v1-s010{display:block}
#sub-v2-s010:checked~#v2-s010{display:block}
#sub-prompt-s010:checked~#prompt-s010{display:block}
#sub-beat-s010:checked~.sub-tabs label[for=sub-beat-s010],
#sub-v1-s010:checked~.sub-tabs label[for=sub-v1-s010],
#sub-v2-s010:checked~.sub-tabs label[for=sub-v2-s010],
#sub-prompt-s010:checked~.sub-tabs label[for=sub-prompt-s010]
{border-bottom-color:var(--accent);color:var(--head)}

/* ── Info bar ── */
.info-bar{display:flex;gap:24px;flex-wrap:wrap;padding:12px 0;margin-bottom:12px;border-bottom:1px solid var(--border);font-size:13px}
.info-bar span{color:var(--text)}
.info-bar b{color:var(--head)}
.info-bar .sep{color:var(--border);margin:0 4px}

/* ── v2 11-column table ── */
#v2-s010 table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:13px}
col.c1{width:42px}col.c2{width:72px}col.c3{width:160px}col.c4{width:110px}col.c5{width:90px}col.c6{width:auto;max-width:300px}col.c7{width:140px}col.c8{width:44px}col.c9{width:120px}col.c10{width:180px}col.c11{width:0}
/* 提示词列隐藏（数据供面板读取） */
th:nth-child(11),td:nth-child(11){width:0!important;padding:0!important;overflow:hidden!important;border:none!important;font-size:0!important;max-width:0!important}

thead th{background:var(--card);color:var(--head);padding:10px 6px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap;position:sticky;top:0;z-index:1;border-bottom:2px solid var(--accent)}
tbody td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:top;word-break:break-word}
tbody tr:nth-child(odd){background:var(--row-light)}tbody tr:nth-child(even){background:var(--row-dark)}
tbody tr:hover{background:rgba(244,63,94,.12)}
.prompt-row.clicked td{background:rgba(244,63,94,.12)!important}
tbody td:nth-child(1){white-space:nowrap}tbody td:nth-child(2){white-space:nowrap}tbody td:nth-child(4){white-space:nowrap}tbody td:nth-child(5){white-space:nowrap}tbody td:nth-child(8){white-space:nowrap}
.c-num{color:var(--accent);font-weight:700;text-align:center}
.c-dur{text-align:center;white-space:nowrap;color:var(--green)}
.c-dialogue{color:#fbbf24}
.lens-tech{font-size:11px;color:var(--text);opacity:.35}
.audio-music{color:#fbbf24;font-size:12px}
.audio-sfx{color:#94a3b8;font-size:11px}
.c-notes{color:var(--text);font-size:12px}
.c-prompt{word-break:normal;white-space:pre-line;font-size:12px;line-height:1.5}

/* ── 节拍属性标签 ── */
.prop-tag{display:inline-block;padding:0 3px;border-radius:2px;font-size:10px;font-weight:700;line-height:16px;margin-right:2px;vertical-align:middle}
.c-trigger{background:rgba(244,63,94,.15);color:var(--accent)}
.c-action{background:rgba(34,197,94,.12);color:var(--green)}
.c-react{background:rgba(251,191,36,.12);color:#fbbf24}
.c-estab{background:rgba(148,163,184,.12);color:#94a3b8}
.c-insert{background:rgba(167,139,250,.12);color:#a78bfa}

/* ── 提示词面板 ── */
.prompt-panel{position:fixed;top:40px;right:40px;width:500px;max-width:90vw;height:60vh;max-height:90vh;background:var(--card);border:1px solid var(--accent);z-index:100;display:none;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.4);border-radius:6px}
.prompt-panel.open{display:flex;animation:panelIn .35s cubic-bezier(.34,1.56,.64,1)}
.prompt-panel.dragging{box-shadow:-4px 0 30px rgba(0,0,0,.6)!important}
@keyframes panelIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes snapBounce{0%,100%{transform:scale(1)}40%{transform:scale(.92)}}
.snap-bounce{animation:snapBounce .25s ease}
.prompt-panel.pinned .prompt-overlay{display:none}
.prompt-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:99}
.prompt-overlay.show{display:block}
.prompt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card);cursor:grab;user-select:none;flex-shrink:0}
.prompt-header:active{cursor:grabbing}
.prompt-header h3{color:var(--head);font-size:16px;margin:0}
.prompt-header .shot-meta{color:var(--accent);font-size:13px;font-weight:600;display:inline;vertical-align:baseline}
.prompt-close{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px}
.prompt-close:hover{color:var(--head)}
.prompt-body{flex:1;overflow-y:auto;padding:14px 16px;font-size:14px;line-height:1.8;color:var(--text);min-height:100px;position:relative;scrollbar-width:thin;scrollbar-color:transparent transparent}
.prompt-body:hover{scrollbar-color:rgba(255,255,255,.15) transparent}
.prompt-body::-webkit-scrollbar{width:4px}
.prompt-body::-webkit-scrollbar-thumb{background:transparent;border-radius:2px;transition:background .3s}
.prompt-body:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

.prompt-covered{font-size:12px;color:var(--green);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.prompt-inherit{font-size:11px;color:var(--accent);margin-bottom:12px}
.prompt-text{font-size:14px;line-height:2;color:#d4d4d4;white-space:pre-wrap;background:rgba(0,0,0,.15);border-radius:6px;padding:16px 18px;box-shadow:inset 0 1px 3px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.03)}
.prompt-line{margin-bottom:4px;line-height:1.9;font-size:14px}
.prompt-spacer{height:8px}
/* A: 实心小药丸 */
.prompt-badge-a{display:inline-block;padding:1px 7px;font-size:10px;font-weight:700;border-radius:10px;margin-right:6px;color:#111}
/* B: 左侧竖条 */
.prompt-line-b{border-left:3px solid;padding-left:10px;margin-bottom:4px}
.prompt-line-b .prompt-badge-b{font-size:11px;font-weight:700;margin-right:6px}
/* C: 微底高亮 */
.prompt-line-c{margin-bottom:4px}
.prompt-line-c .prompt-badge-c{font-size:12px;font-weight:700;margin-right:4px}
.prompt-line-c .prompt-badge-c::before{content:"● ";color:inherit;margin-right:2px}
.prompt-body .lens-tech{font-size:11px;opacity:.35}
.prompt-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text);opacity:.3;font-size:15px}
.prompt-row{cursor:pointer}



/* 钉住按钮 */
.btn-pin{background:none;border:none;color:var(--text);font-size:16px;cursor:pointer;padding:4px 6px;opacity:.5;transition:all .2s}
/* Header buttons — unified */
.panel-btn{font-size:11px;padding:4px 8px;border:1px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s ease;line-height:1.4}
.panel-btn:hover{transform:translateY(-1px);background:transparent;color:var(--accent);border-color:var(--accent)}
.panel-btn.pinned{opacity:.7}
.btn-close{border-color:var(--accent);background:var(--accent);font-size:16px;padding:2px 6px;color:#fff}
.btn-close:hover{background:transparent;color:var(--accent);border-color:var(--accent);transform:scale(1.1)}

/* 复制按钮弹跳 */
@keyframes copyBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.copy-bounce{animation:copyBounce .3s ease}

/* 正文淡入 */
.prompt-text.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Other tables ── */
.arc-table{width:100%;border-collapse:collapse;font-size:13px;margin:16px 0}
.arc-table th{background:var(--card);color:var(--head);padding:8px 6px;text-align:left;font-weight:600;font-size:12px;border-bottom:2px solid var(--accent)}
.arc-table td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:top}
.arc-table tr:nth-child(odd){background:var(--row-light)}
.arc-table tr:nth-child(even){background:var(--row-dark)}
.beat-table{width:100%;border-collapse:collapse;font-size:13px;margin:16px 0}
.beat-table th{background:var(--card);color:var(--head);padding:8px 6px;text-align:left;font-weight:600;font-size:12px;border-bottom:2px solid var(--accent);white-space:nowrap}
.beat-table td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.beat-table tr:nth-child(odd){background:var(--row-light)}
.beat-table tr:nth-child(even){background:var(--row-dark)}
.beat-table .beat-red{color:var(--accent);font-weight:700}
.v1-beat{margin-bottom:28px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:6px}
.v1-beat h3{color:var(--head);font-size:15px;margin-bottom:8px}
.v1-beat .meta{font-size:12px;color:var(--text);margin-bottom:8px}
.v1-shot{margin:6px 0 6px 16px;font-size:13px;color:var(--text)}
.v1-shot .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;margin-right:6px}
.tag-trigger{background:rgba(244,63,94,.15);color:var(--accent)}
.tag-action{background:rgba(34,197,94,.12);color:var(--green)}
.tag-react{background:rgba(251,191,36,.12);color:#fbbf24}
.tag-insert{background:rgba(167,139,250,.12);color:#a78bfa}
.tag-estab{background:rgba(148,163,184,.12);color:#94a3b8}
.placeholder{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text);font-size:18px;opacity:.4}
.placeholder-scene{display:flex;align-items:center;justify-content:center;height:300px;color:var(--text);font-size:18px;opacity:.3}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px}

/* ── Refresh button ── */
.btn-refresh{padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.btn-refresh:hover{opacity:.85}
.btn-refresh:disabled{opacity:.4;cursor:default}
.refresh-status{font-size:11px;margin-left:8px}
.refresh-status.ok{color:var(--green)}.refresh-status.err{color:var(--accent)}

/* ── Settings panel ── */
.settings-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;justify-content:center;align-items:center}
.settings-panel.show{display:flex}
.settings-box{background:var(--card);padding:24px;border-radius:8px;width:420px;max-width:90vw}
.settings-box h3{color:var(--head);margin-bottom:16px}
.settings-box label{display:block;color:var(--text);font-size:12px;margin:8px 0 4px}
.settings-box input{width:100%;padding:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:4px;font-size:13px}
.settings-box .btn-row{display:flex;gap:8px;margin-top:16px}
.settings-box button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600}
.btn-save{background:var(--accent);color:#fff}.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--row-light);color:var(--text)}.btn-cancel:hover{background:var(--row-dark)}
.beat-section{margin-bottom:32px}
.beat-label{display:inline-block;padding:2px 8px;border-radius:3px;font-size:12px;font-weight:700;margin-right:8px}
.beat-dot{background:var(--row-light);color:var(--text)}
.beat-red{background:var(--accent);color:#fff}
.beat-title{color:var(--head);font-size:15px;font-weight:600;margin:8px 0 4px}
.beat-action,.beat-reaction{font-size:13px;color:var(--text);margin:2px 0;padding-left:12px;border-left:2px solid var(--border)}
.beat-action b,.beat-reaction b{color:var(--head)}
.beat-intent{font-size:13px;color:var(--green);margin-top:6px;font-style:italic}
.space-label{color:var(--green);font-size:13px;font-weight:600;margin-bottom:8px}
h2{color:var(--head);font-size:18px;margin:20px 0 12px}
h3{color:var(--head);font-size:15px;margin:16px 0 8px}
p,li{font-size:14px;margin:4px 0}
ul{padding-left:20px}

/* 调整大小手柄 */
.resize-handle{position:absolute;z-index:10}
.resize-handle.n,.resize-handle.s{left:8px;right:8px;height:6px}
.resize-handle.n{top:-3px;cursor:n-resize}
.resize-handle.s{bottom:-3px;cursor:s-resize}
.resize-handle.e,.resize-handle.w{top:8px;bottom:8px;width:6px}
.resize-handle.e{right:-3px;cursor:e-resize}
.resize-handle.w{left:-3px;cursor:w-resize}
.resize-handle.ne,.resize-handle.se,.resize-handle.sw,.resize-handle.nw{width:12px;height:12px}
.resize-handle.ne{top:-4px;right:-4px;cursor:ne-resize}
.resize-handle.se{bottom:-4px;right:-4px;cursor:se-resize}
.resize-handle.sw{bottom:-4px;left:-4px;cursor:sw-resize}
.resize-handle.nw{top:-4px;left:-4px;cursor:nw-resize}
</style>
</head>
<body>
<div class="container">
<header class="top">
<h1>{{TITLE}} — <span>分镜全篇</span></h1>
<div class="sub"><!-- 副标题 --></div>
</header>

{{SCENE_TABS}}

<!-- ═══ 价值弧线 ═══ -->
{{ARC_SECTION}}

{{SCENE_SECTIONS}}</section>


<!-- Prompt Panel -->
<div class="prompt-overlay" id="prompt-overlay" onclick="closePrompt()"></div>
<div class="prompt-panel" id="prompt-panel">
<div class="prompt-header">
<div><h3 style="margin:0;color:var(--head);font-size:16px;display:inline">提示词</h3><span class="shot-meta" id="prompt-shot-num" style="margin-left:8px"></span></div>
<div style="display:flex;gap:6px;align-items:center">
<button class="panel-btn" id="prompt-copy">复制</button>
<button class="panel-btn btn-close" onclick="var p=document.getElementById(\'prompt-panel\');p.classList.remove(\'pinned\');var b=p.querySelector(\'.btn-pin\');if(b)b.classList.remove(\'pinned\');closePrompt()">✕</button>
</div>
</div>
<div class="prompt-body" id="prompt-body">
<div class="prompt-empty">点击镜头行查看提示词</div>
</div>
</div>
</div>

<!-- Settings Panel -->
<div id="settings-panel" class="settings-panel">
<div class="settings-box">
<h3>飞书 API 设置</h3>
<label>App ID</label>
<input id="cfg-app-id" placeholder="cli_xxx">
<label>App Secret</label>
<input id="cfg-app-secret" type="password" placeholder="••••">
<label>App Token（多维表格 URL 中 /base/ 后面那段）</label>
<input id="cfg-app-token" placeholder="OwBSbEQS...">
<label>Table ID（URL 中 ?table= 后面那段）</label>
<input id="cfg-table-id" placeholder="tbl2gBoyb...">
<div class="btn-row">
<button class="btn-save" onclick="saveSettings()">保存</button>
<button class="btn-cancel" onclick="closeSettings()">取消</button>
</div>
</div>
</div>

<script>
// Tab persistence
(function(){
  var sceneRadios = document.querySelectorAll('[name=scene]');
  var savedScene = localStorage.getItem('lastScene');
  if (savedScene) { var el = document.getElementById(savedScene); if (el) el.checked = true; }
  sceneRadios.forEach(function(r){ r.addEventListener('change', function(){ localStorage.setItem('lastScene', r.id); }); });
  var allSubGroups = document.querySelectorAll('[name^=sub-]');
  var seenGroups = {};
  allSubGroups.forEach(function(r){
    var g = r.name; if (seenGroups[g]) return; seenGroups[g] = true;
    var sceneId = g.replace('sub-', '');
    var savedSub = localStorage.getItem('lastSub-' + sceneId);
    if (savedSub) { var el = document.getElementById(savedSub); if (el) el.checked = true; }
    document.querySelectorAll('[name="' + g + '"]').forEach(function(sr){
      sr.addEventListener('change', function(){ localStorage.setItem('lastSub-' + sceneId, sr.id); });
    });
  });
})();

// ── Feishu Refresh ──
var JIWEI_SHORT = {"🔴 正打":"🔴正","🟡 反打":"🟡反","🟢 第三人称":"🟢三","🔵 空间环境":"🔵环","🟣 插入/切出":"🟣插"};

function getSettings(){
  var raw = localStorage.getItem('feishu_cfg');
  return raw ? JSON.parse(raw) : null;
}

function openSettings(){
  var cfg = getSettings();
  if (cfg) {
    document.getElementById('cfg-app-id').value = cfg.app_id || '';
    document.getElementById('cfg-app-secret').value = cfg.app_secret || '';
    document.getElementById('cfg-app-token').value = cfg.app_token || '';
    document.getElementById('cfg-table-id').value = cfg.table_id || '';
  }
  document.getElementById('settings-panel').classList.add('show');
}

function closeSettings(){
  document.getElementById('settings-panel').classList.remove('show');
}

function saveSettings(){
  var cfg = {
    app_id: document.getElementById('cfg-app-id').value.trim(),
    app_secret: document.getElementById('cfg-app-secret').value.trim(),
    app_token: document.getElementById('cfg-app-token').value.trim(),
    table_id: document.getElementById('cfg-table-id').value.trim()
  };
  localStorage.setItem('feishu_cfg', JSON.stringify(cfg));
  closeSettings();
  refreshFromFeishu();
}

function setStatus(text, cls){
  var el = document.getElementById('refresh-status');
  if (!el) return;
  el.textContent = text;
  el.className = 'refresh-status ' + (cls || '');
}

async function refreshFromFeishu(){
  var cfg = getSettings();
  if (!cfg || !cfg.app_id) { openSettings(); return; }
  
  var btn = document.getElementById('btn-refresh');
  if (btn) btn.disabled = true;
  setStatus('连接中...', '');
  
  // Helper: call Feishu via local proxy (avoids CORS)
  async function feishuCall(url, headers, body) {
    var resp = await fetch('/api/feishu', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: url, headers: headers || {}, body: body || null})
    });
    return resp.json();
  }
  
  try {
    // 1. Get token (via proxy)
    var tokenData = await feishuCall(
      'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
      {'Content-Type': 'application/json'},
      {app_id: cfg.app_id, app_secret: cfg.app_secret}
    );
    if (tokenData.code !== 0) throw new Error('Token: ' + tokenData.msg);
    var token = tokenData.tenant_access_token;
    
    // 2. Fetch records (via proxy)
    var allRecords = [];
    var pageToken = null;
    setStatus('拉取数据...', '');
    
    do {
      var feishuUrl = 'https://open.feishu.cn/open-apis/bitable/v1/apps/' + cfg.app_token + '/tables/' + cfg.table_id + '/records?page_size=50';
      if (pageToken) feishuUrl += '&page_token=' + pageToken;
      var data = await feishuCall(feishuUrl, {'Authorization': 'Bearer ' + token});
      if (data.code !== 0) throw new Error('Fetch: ' + data.msg);
      allRecords = allRecords.concat(data.data.items || []);
      pageToken = data.data.has_more ? data.data.page_token : null;
    } while (pageToken);
    
    setStatus('重建表格...', '');
    
    // 3. Normalize
    function norm(v){
      if (Array.isArray(v) && v.length && v[0].text !== undefined) {
        return v.map(function(x){return x.text}).join('');
      }
      return (v !== null && v !== undefined) ? String(v) : '';
    }
    
    var shots = [];
    allRecords.forEach(function(r){
      var f = r.fields || {};
      var s = {
        jinghao: norm(f['镜号']),
        yunjing: norm(f['运镜']),
        kongjian: norm(f['空间关系']),
        jingbie: norm(f['景别']),
        jiaoduan: norm(f['焦段']),
        jingshen: norm(f['景深']),
        jiwei: norm(f['机位']),
        dongzuo: norm(f['动作调度']),
        taici: norm(f['台词']),
        shichang: parseFloat(f['时长(秒)']) || 0,
        yinpin: norm(f['音频']),
        beizhu: norm(f['导演备注']),
        tishici: norm(f['提示词']),
        beatNum: norm(f['beat序号']),
        beatType: norm(f['beat类型']),
        beatTitle: norm(f['beat标题']),
        beatAction: norm(f['节拍动作'])
      };
      if (s.jinghao) shots.push(s);
    });
    shots.sort(function(a,b){ return a.jinghao.localeCompare(b.jinghao, undefined, {numeric:true}); });
    
    // 4. Build beat-grouped HTML
    function buildRow(s){
      var raw = s.jingbie.trim();
      var lensMatch = raw.match(/(\d+mm·(?:浅|中|深)(?:→(?:浅|中|深))?)/);
      var lensHtml = lensMatch ? '<br><span class="lens-tech">' + lensMatch[1] + '</span>' : '';
      var framing = lensMatch ? (raw.substring(0, lensMatch.index) + raw.substring(lensMatch.index + lensMatch[0].length)).trim() : raw;
      var sheyingji = framing.indexOf('↓') !== -1 ? framing.split('↓')[0].trim() + '<br>↓<br>' + framing.split('↓')[1].trim() + lensHtml : framing + lensHtml;
      var yinpin = s.yinpin, audioHtml;
      if (yinpin && yinpin.trim() && yinpin.trim() !== '—') audioHtml = '<span class="audio-sfx">' + yinpin.replace(/\n/g,'<br>') + '</span>';
      else audioHtml = '<span class="audio-music">—</span>';
      var dur = s.shichang ? Math.round(s.shichang) + 's' : '';
      var taiciHtml = s.taici ? '<td class="c-dialogue">' + s.taici + '</td>' : '<td></td>';
      return '<tr><td class="c-num">' + s.jinghao + '</td><td>' + s.yunjing + '</td><td>' + s.kongjian + '</td><td>' + sheyingji + '</td><td>' + (JIWEI_SHORT[s.jiwei]||s.jiwei) + '</td><td>' + s.dongzuo + '</td>' + taiciHtml + '<td class="c-dur">' + dur + '</td><td>' + audioHtml + '</td><td class="c-notes">' + s.beizhu + '</td><td class="c-prompt">' + s.tishici + '</td></tr>';
    }
    
    var groups = {}; var order = [];
    shots.forEach(function(s){ var k = s.beatNum||'_'; if(!groups[k]){groups[k]=[];order.push(k);} groups[k].push(s); });
    var blocks = [];
    var th = '<thead><tr><th>#</th><th>运镜</th><th>空间关系</th><th>摄影机</th><th>机位</th><th>动作调度</th><th>台词</th><th>时长</th><th>音频</th><th>导演备注</th><th>提示词</th></tr></thead>';
    var cg = '<colgroup><col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7"><col class="c8"><col class="c9"><col class="c10"><col class="c11"></colgroup>';
    
    order.forEach(function(k){
      var gs = groups[k]; var b = gs[0];
      if(k === '空间' || k === '_' && !b.beatType){
        blocks.push('<div class="beat-section"><div class="space-label">▸ 空间建立镜 (' + gs.length + ' 镜)</div><div class="table-wrap"><table>' + cg + th + '<tbody>' + gs.map(buildRow).join('') + '</tbody></table></div></div>');
      } else {
        var lc = b.beatType.indexOf('戏点')!==-1 ? 'beat-red' : 'beat-dot';
        var block = '<div class="beat-section"><span class="beat-label ' + lc + '">' + b.beatType + '</span><span class="beat-title">beat ' + k + '：' + b.beatTitle + ' (' + gs.length + ' 镜)</span>';
        if(b.beatAction){
          var parts = b.beatAction.split('→');
          block += '<div class="beat-action">' + parts[0].trim() + (parts.length>1?'<br>'+parts[1].trim():'') + '</div>';
        }
        block += '<div class="table-wrap"><table>' + cg + th + '<tbody>' + gs.map(buildRow).join('') + '</tbody></table></div></div>';
        blocks.push(block);
      }
    });
    
    // 5. Replace v2-s010 content
    var container = document.getElementById('v2-s010');
    if (container && shots.length > 0) {
      container.innerHTML = blocks.join('');
    } else if (shots.length === 0) {
      setStatus('无数据，请检查飞书表格', 'err');
      if (btn) btn.disabled = false;
      return;
    }
    
    // Update stats
    var totalDur = shots.reduce(function(a,s){return a + (s.shichang||0)}, 0);
    setStatus(shots.length + '镜 ' + Math.floor(totalDur/60) + '′' + Math.round(totalDur%60) + '″', 'ok');
    
    // Re-attach prompt click handlers
    setTimeout(attachPromptClicks, 200);
    
    // Update info bar stats
    var infoBar = document.querySelector('.info-bar');
    if (infoBar && infoBar.children.length >= 2) {
      infoBar.children[1].innerHTML = '总镜数 <b>' + shots.length + '</b>';
      if (infoBar.children.length >= 3) {
        infoBar.children[2].innerHTML = '总时长 <b>' + Math.floor(totalDur/60) + '′' + Math.round(totalDur%60) + '″</b>';
      }
    }
    
  } catch(e) {
    setStatus('失败: ' + e.message, 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── 提示词面板 ──
var currentShotData = null;

function openPrompt(shotNum, rowElement) {
  var row = rowElement || document.querySelector('[data-shot="' + shotNum + '"]');
  if (!row) return;
  
  var cells = row.querySelectorAll('td');
  var promptRaw = cells.length >= 11 ? cells[10].textContent.trim() : '';
  var promptText = '';
  var sourceShot = shotNum;
  var visited = {};
  
  // Follow ←scene-NN or ←NN chain
  while (promptRaw) {
    var inheritMatch = promptRaw.match(/^[↑←]\s*(?:(\w+)-)?(\d+)$/);
    if (inheritMatch) {
      var target = inheritMatch[2];
      if (visited[target]) break;
      visited[target] = true;
      sourceShot = target;
      var targetRow = document.querySelector('[data-shot="' + target + '"]');
      if (targetRow) {
        var targetCells = targetRow.querySelectorAll('td');
        promptRaw = targetCells.length >= 11 ? targetCells[10].textContent.trim() : '';
      } else {
        promptText = '(未找到镜' + target + ')';
        break;
      }
    } else {
      promptText = promptRaw;
      break;
    }
  }
  
  currentShotData = {promptText: promptText, sourceShot: sourceShot};
  
  // Highlight all shots sharing same prompt + collect covered shots
  document.querySelectorAll('.prompt-row.clicked').forEach(function(r){r.classList.remove('clicked')});
  var coveredShots = [shotNum];
  if (promptText) {
    var rootSource = sourceShot !== shotNum ? sourceShot : shotNum;
    document.querySelectorAll('#v2-s010 .prompt-row').forEach(function(r){
      var rc = r.querySelectorAll('td');
      if (rc.length < 11) return;
      var rp = rc[10].textContent.trim();
      var sn = r.getAttribute('data-shot');
      if (sn === shotNum) { r.classList.add('clicked'); return; }  // highlight self, skip double-count
      if (sn === rootSource) { r.classList.add('clicked'); coveredShots.push(sn); return; }
      var m = rp.match(/^[↑←]\s*(?:\w+-)?(\d+)$/);
      if (m && m[1] === rootSource) { r.classList.add('clicked'); coveredShots.push(sn); }
    });
  }
  coveredShots.sort(function(a,b){return parseInt(a)-parseInt(b)});
  var coveredLabel = '镜 ' + coveredShots.join(', ');
  document.getElementById('prompt-shot-num').textContent = coveredLabel;
  
  var body = document.getElementById('prompt-body');
  if (promptText) {
    var inheritNote = sourceShot !== shotNum ? '<div class="prompt-inherit">↑ 继承自 镜' + sourceShot + '</div>' : '';
    // Parse 演/拍/呈 blocks
    var blocks = parsePromptBlocks(promptText);
    
    body.innerHTML = '' +
      '' +
      inheritNote +
      '<div class="prompt-text fade-in">' + blocks + '</div>';
  } else {
    body.innerHTML = '<div class="prompt-empty">暂无提示词</div>';
  }
  
  // Copy button handler (may not exist if no prompt text)
  var copyBtn = document.getElementById('prompt-copy');
  if (copyBtn) { copyBtn.onclick = function(){
    var text = promptText || '';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        var btn = document.getElementById('prompt-copy');
        btn.textContent = '✓ 已复制'; bounceCopyBtn();
        setTimeout(function(){ btn.textContent = '📋 复制'; }, 2000);
      }).catch(function(){ fallbackCopy(text); });
    } else { fallbackCopy(text); }
  };
  }
  
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var btn = document.getElementById('prompt-copy');
    btn.textContent = '✓ 已复制'; bounceCopyBtn();
    setTimeout(function(){ btn.textContent = '📋 复制'; }, 2000);
  }
  
  var panelEl = document.getElementById('prompt-panel');
  panelEl.classList.add('open');
  panelEl._restoreState();
  if (!panelEl.classList.contains('pinned')) {
    document.getElementById('prompt-overlay').classList.add('show');
  }
}
function parsePromptBlocks(text) {
  // Style assignments: A=药丸(场景/人物), B=竖条(空间锚/镜头), C=微底(其余)
  var headingRe = /^(@图片\d+|场景|空间锚|人物|镜头[一二三四五六七八九十\d]+|视角|光线|调色|氛围|时长|景别|焦段|景深|机位|运镜)[：:]/;
  var styleMap = {};
  var colors = {
    '场景':'#f59e0b','空间锚':'#3b82f6','人物':'#f59e0b','镜头':'#a78bfa',
    '视角':'#10b981','光线':'#f59e0b','调色':'#ec4899',
    '氛围':'#8b5cf6','时长':'#6b7280','景别':'#f43f5e',
    '焦段':'#3b82f6','景深':'#10b981','机位':'#f59e0b',
    '运镜':'#a78bfa','@图片':'#6b7280'
  };
  var lines = text.split(/[\n\r]+/);
  var result = '';
  for (var i=0;i<lines.length;i++){
    var line = lines[i];
    var m = line.match(headingRe);
    if (m) {
      var key = m[1];
      if (key.indexOf('@图片')===0) key = '@图片';
      else if (/^镜头[一二三四五六七八九十\d]+$/.test(key)) key = '镜头';
      var color = colors[key]||'#6b7280';
      var style = styleMap[key]||'C';
      var body = line.substring(m[0].length).replace(/</g,'&lt;');
      
      if (style === 'A') {
        result += '<div class="prompt-line"><span class="prompt-badge-a" style="background:'+color+'">'+m[1]+'</span> '+body+'</div>';
      } else if (style === 'B') {
        result += '<div class="prompt-line-b" style="border-color:'+color+'"><span class="prompt-badge-b" style="color:'+color+'">'+m[1]+'</span> '+body+'</div>';
      } else {
        result += '<div class="prompt-line-c"><span class="prompt-badge-c" style="color:'+color+'">'+m[1]+'</span> '+body+'</div>';
      }
    } else if (line.trim()) {
      result += '<div class="prompt-line">'+line.replace(/</g,'&lt;')+'</div>';
    } else {
      result += '<div class="prompt-spacer"></div>';
    }
  }
  return result;
}

// 拖拽 + 调整大小 + 钉住
(function(){
  var p = document.getElementById('prompt-panel'); if(!p) return;
  var header = p.querySelector('.prompt-header');
  var MIN_W=320,MIN_H=200;
  
  // Drag
  var dX=0,dY=0,dragging=false;
  header.addEventListener('mousedown',function(e){
    if(e.target.closest('button')) return;
    dragging=true; dX=e.clientX-p.offsetLeft; dY=e.clientY-p.offsetTop;
    p.classList.add('dragging');
    p.style.cursor='grabbing'; e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(dragging){
      var x=e.clientX-dX, y=e.clientY-dY;
      x=Math.max(0,Math.min(window.innerWidth-p.offsetWidth-20,x));
      y=Math.max(0,Math.min(window.innerHeight-p.offsetHeight-10,y));
      p.style.left=x+'px'; p.style.top=y+'px'; p.style.right='auto';
      return;
    }
    // Resize logic
    if(!resizing)return;
    var dx=e.clientX-resizeStart.x, dy=e.clientY-resizeStart.y;
    var r=resizing; // {dir:'n','s','e','w','ne','nw','se','sw'}
    
    if(r.dir.indexOf('e')!==-1){
      var nw=Math.max(MIN_W,resizeStart.w+dx);
      p.style.width=nw+'px';
    }
    if(r.dir.indexOf('w')!==-1){
      var nw=Math.max(MIN_W,resizeStart.w-dx);
      p.style.width=nw+'px';
      p.style.left=(resizeStart.l+dx)+'px'; p.style.right='auto';
    }
    if(r.dir.indexOf('s')!==-1){
      p.style.height=Math.max(MIN_H,resizeStart.h+dy)+'px';
    }
    if(r.dir.indexOf('n')!==-1){
      var nh=Math.max(MIN_H,resizeStart.h-dy);
      p.style.height=nh+'px';
      p.style.top=(resizeStart.t+dy)+'px';
    }
  });
  document.addEventListener('mouseup',function(){
    if(dragging){dragging=false;p.style.cursor='';p.classList.remove('dragging');}
    if(resizing){resizing=null;}
    if(p._saveState)p._saveState();
  });
  
  // Resize handles
  var resizing=null,resizeStart={};
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(dir){
    var h=document.createElement('div');
    h.className='resize-handle '+dir;
    h.addEventListener('mousedown',function(e){
      resizing={dir:dir};
      resizeStart={x:e.clientX,y:e.clientY,l:p.offsetLeft,t:p.offsetTop,w:p.offsetWidth,h:p.offsetHeight};
      e.preventDefault(); e.stopPropagation();
    });
    p.appendChild(h);
  });
  
  // Save/restore state
  p._saveState = function(){
    this._left=this.style.left||''; this._top=this.style.top||'';
    this._width=this.style.width||''; this._height=this.style.height||'';
  };
  p._restoreState = function(){
    if(this._left){
      if(this._left==='auto'){this.style.right=this._right||'8px';this.style.left='auto';}
      else{this.style.left=this._left;this.style.right='auto';}
      this.style.top=this._top||'40px';
    }
    if(this._width)this.style.width=this._width;
    if(this._height)this.style.height=this._height;
  };
  p._saveState = function(){
    this._left=this.style.left||''; this._right=this.style.right||'';
    this._top=this.style.top||''; this._width=this.style.width||''; this._height=this.style.height||'';
  };
  
  // Pin button
  var b=document.createElement('button');b.className='panel-btn';b.textContent='钉住';b.title='钉住面板';
  var hr=p.querySelector('.prompt-header>div:last-child');if(hr)hr.insertBefore(b,hr.firstChild);
  b.onclick=function(){var pn=p.classList.toggle('pinned');b.classList.toggle('pinned',pn);
    if(!pn)document.getElementById('prompt-overlay').classList.add('show');
    else document.getElementById('prompt-overlay').classList.remove('show');};

  // Snap buttons
  function snap(dir){
    if(dir==='right'){
      p.style.left='auto'; p.style.right='8px'; p.style.top='40px';
      p.style.height=(window.innerHeight-80)+'px'; p.style.width='500px';
    } else {
      p.style.left='40px'; p.style.right='auto'; p.style.top='auto';
      p.style.bottom='8px'; p.style.width=(window.innerWidth-80)+'px'; p.style.height='45vh';
    }
    p._saveState();
  }
  ['right','bottom'].forEach(function(d){
    var sb=document.createElement('button');sb.className='panel-btn';
    sb.textContent={'right':'右贴附','bottom':'下贴附'}[d];sb.title='贴靠'+(d==='right'?'右侧':'下侧');
    
    sb.onclick=function(e){snap(d);sb.classList.add('snap-bounce');setTimeout(function(){sb.classList.remove('snap-bounce');},250);e.stopPropagation();};
    hr.insertBefore(sb,hr.firstChild);
  });
})();

function bounceCopyBtn(){
  var b=document.getElementById('prompt-copy');if(!b)return;
  b.classList.remove('copy-bounce');void b.offsetWidth;b.classList.add('copy-bounce');
}


function closePrompt() {
  var panel = document.getElementById('prompt-panel');
  if (panel.classList.contains('pinned')) return; // pinned → don't close
  panel._saveState();
  panel.classList.remove('open');
  panel.classList.remove('pinned');
  document.getElementById('prompt-overlay').classList.remove('show');
  document.querySelectorAll('.prompt-row.clicked').forEach(function(r){r.classList.remove('clicked')});
  var pb = panel.querySelector('.panel-btn.pinned');
  if (pb) pb.classList.remove('pinned');
}

function attachPromptClicks() {
  document.querySelectorAll('#v2-s010 tbody tr').forEach(function(row){
    var numCell = row.querySelector('.c-num');
    if (!numCell || row.classList.contains('prompt-row')) return;
    row.classList.add('prompt-row');
    var shotNum = numCell.textContent.trim();
    row.setAttribute('data-shot', shotNum);
    row.addEventListener('click', function(e){
      // Clear previous clicked before setting new one
      document.querySelectorAll('.prompt-row.clicked').forEach(function(r){r.classList.remove('clicked')});
      openPrompt(shotNum, row);
    });
  });
}

// Attach clicks after initial load
document.addEventListener('DOMContentLoaded', function(){
  setTimeout(attachPromptClicks, 500);
});
// Also attach after tab switch
document.querySelectorAll('[name=scene], [name^=sub-]').forEach(function(r){
  r.addEventListener('change', function(){ setTimeout(attachPromptClicks, 300); });
});
